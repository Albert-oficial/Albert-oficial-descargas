<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZONA DE DESCARGA DE ALBERT OFICIAL</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:Arial;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* ANIMACIONES */
@keyframes rgbText{
0%{color:red;}25%{color:blue;}50%{color:white;}75%{color:magenta;}100%{color:red;}
}
@keyframes rgbBorder{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* METEORITOS REALISTAS */
.meteor{
position:fixed;
top:-100px;
width:2px;
height:120px;
background:linear-gradient(white, rgba(255,255,255,0));
opacity:0.9;
filter:blur(1px);
transform:rotate(45deg);
animation:meteorFall linear infinite;
}

.meteor::before{
content:"";
position:absolute;
top:0;
left:-2px;
width:6px;
height:6px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white, 0 0 20px white;
}

@keyframes meteorFall{
0%{transform:translate(0,0) rotate(45deg);opacity:0;}
10%{opacity:1;}
100%{transform:translate(300px,120vh) rotate(45deg);opacity:0;}
}

.header{text-align:center;padding:20px;}
.header h1{animation:rgbText 5s infinite linear;}

.creador{text-align:center;margin:20px;}
.creador img{
width:90%;
max-width:400px;
border-radius:15px;
padding:4px;
background:linear-gradient(45deg, red, blue, white, magenta);
background-size:300% 300%;
animation:rgbBorder 4s linear infinite;
}

.creador p{
animation:rgbText 5s infinite linear;
font-weight:bold;
}

.search{
padding:12px;
width:90%;
margin:10px auto;
display:block;
border-radius:10px;
border:none;
background:#111;
color:#fff;
font-size:16px;
}

.container{padding:15px;}

.card{
background:#111;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 15px red;
transition:0.3s;
}
.card:hover{
transform:scale(1.03);
box-shadow:0 0 35px red;
}

.img-rgb{
padding:4px;
border-radius:10px;
background:linear-gradient(45deg, red, blue, white, magenta);
background-size:300% 300%;
animation:rgbBorder 4s linear infinite;
margin-bottom:10px;
}
.img-rgb img{
width:100%;
border-radius:8px;
}

.nombre-rgb{
animation:rgbText 4s infinite linear;
text-align:center;
}

.fecha,.contador{
text-align:center;
font-size:14px;
animation:rgbText 6s infinite linear;
}

.btn{
padding:12px;
margin-top:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(45deg, red, blue, white, magenta);
background-size:300% 300%;
animation:rgbBorder 4s linear infinite;
color:#000;
}
</style>
</head>

<body>

<div class="header">
<h1>ZONA DE DESCARGA DE ALBERT OFICIAL</h1>
</div>

<div class="creador">
<img src="https://i.imgur.com/jJwW8vt.jpeg">
<p>ALBERT OFICIAL CREADOR</p>
</div>

<input class="search" placeholder="Buscar..." oninput="buscar(this.value)">
<div class="container" id="lista"></div>

<script>

/* METEORITOS DINÁMICOS */
function crearMeteoros(){
for(let i=0;i<8;i++){
const m = document.createElement("div");
m.className = "meteor";
m.style.left = Math.random()*100 + "%";
m.style.animationDuration = (2 + Math.random()*4) + "s";
m.style.animationDelay = (Math.random()*5) + "s";
document.body.appendChild(m);
}
}
crearMeteoros();

/* DATOS BASE */
const baseArchivos = [
{
id:"file1",
nombre:"HOLOGRAMA NEGRO VIP",
link:"https://www.mediafire.com/file/esvbz0z013a5foh/HOLOGRAMA_NEGRO_%252B_HOLO_ARMAS_%252B_PARED_TRANSPARENTE_SEGURO_%25F0%259F%2594%2590.zip/file",
imagen:"https://i.imgur.com/iESVSzS.png",
fecha:"24/03/2026",
descargas:0
},
{
id:"file2",
nombre:"ARCHIVO NO ENCONTRADO",
link:"https://example.com",
imagen:"https://i.imgur.com/jJwW8vt.jpeg",
fecha:"01/03/2026",
descargas:0
}
];

/* CONTROL DE VERSION (ARREGLA BUG) */
const VERSION = "v2";

let archivos;

try{
const guardado = JSON.parse(localStorage.getItem("archivos"));
const versionGuardada = localStorage.getItem("versionArchivos");

if(!guardado || versionGuardada !== VERSION){
archivos = baseArchivos;
localStorage.setItem("versionArchivos", VERSION);
guardar();
}else{
archivos = guardado;
}
}catch(e){
archivos = baseArchivos;
}

/* GUARDAR */
function guardar(){
localStorage.setItem("archivos", JSON.stringify(archivos));
}

/* RENDER */
function render(lista = archivos){
const contenedor = document.getElementById("lista");
let html="";

lista.forEach((a)=>{
html+=`
<div class="card">
<div class="img-rgb"><img src="${a.imagen}" loading="lazy"></div>
<h2 class="nombre-rgb">${a.nombre}</h2>
<div class="fecha">📅 ${a.fecha}</div>
<div class="contador">⬇️ ${a.descargas || 0} descargas</div>
<div class="btn" onclick="descargar('${a.id}')">DESCARGAR</div>
</div>`;
});

contenedor.innerHTML = html;
}
render();

/* DESCARGAR */
function descargar(id){
const archivo = archivos.find(a => a.id === id);
if(!archivo) return;

archivo.descargas = (archivo.descargas || 0) + 1;
guardar();
render();

setTimeout(()=>{
window.open(archivo.link, "_blank");
},300);
}

/* BUSCAR */
function buscar(text){
const filtrados = archivos.filter(a =>
a.nombre.toLowerCase().includes(text.toLowerCase())
);
render(filtrados);
}

</script>

</body>
</html>
