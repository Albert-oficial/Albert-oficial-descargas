<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZONA DE DESCARGA DE ALBERT OFICIAL</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#000;
    color:#fff;
}

/* HEADER */
.header{
    text-align:center;
    padding:20px;
}

.header h1{
    color:#00ff88;
    font-size:26px;
    text-shadow:0 0 10px #00ff88;
}

/* BANNER */
.banner{
    width:100%;
    height:300px;
    background: url('https://i.imgur.com/jJwW8vt.jpeg') center/cover no-repeat;
    border-bottom: 2px solid #00ff88;
    box-shadow: 0 0 20px #00ff88;
}

/* CONTENEDOR */
.container{
    padding:15px;
}

/* CARD */
.card{
    background:#111;
    border-radius:15px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 0 10px #00ff88;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
    box-shadow:0 0 20px #00ff88;
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h2{
    margin:10px 0;
    color:#00ff88;
}

/* BOTON */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    border-radius:10px;
    background:linear-gradient(45deg,#00ff88,#00cc66);
    color:#000;
    font-weight:bold;
    text-decoration:none;
    transition:0.3s;
    box-shadow:0 0 10px #00ff88;
}

.btn:hover{
    background:linear-gradient(45deg,#00cc66,#00ff88);
    box-shadow:0 0 10px #00ff88;
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- TITULO ARRIBA -->
<div class="header">
    <h1>ZONA DE DESCARGAS DE ALBERT OFICIAL</h1>
</div>

<!-- IMAGEN DESPUES DEL TITULO -->
<div class="banner"></div>

<div class="container"
    <!-- ARCHIVO 1 -->
    <div class="card">
        <img src="https://i.imgur.com/iESVSzS.png">
        <h2>HOLOGRAMA NEGRO VIP 
        <a href="https://www.mediafire.com/file/esvbz0z013a5foh/HOLOGRAMA_NEGRO_%252B_HOLO_ARMAS_%252B_PARED_TRANSPARENTE_SEGURO_%25F0%259F%2594%2590.zip/file" class="btn">DESCARGAR</a>
    </div>

    <!-- ARCHIVO 2 -->
    <div class="card">
        <img src="https://i.imgur.com/jJwW8vt.jpeg">
        <h2>ARCHIVO NO ENCONTRADO</h2>
        <a href="#" class="btn">DESCARGAR</a>
    </div>

    <!-- ARCHIVO 3 -->
    <div class="card">
        <img src="https://i.imgur.com/jJwW8vt.jpeg">
        <h2>ARCHIVO NO EN CONTRADO</h2>
        <a href="#" class="btn">DESCARGAR</a>
    </div>

</div>

</body>
</html>
