<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZONA DE DESCARGA DE ALBERT OFICIAL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* TEXTO RGB */
@keyframes rgbText{
0%{color:red;}
25%{color:blue;}
50%{color:white;}
75%{color:magenta;}
100%{color:red;}
}

/* BORDE RGB */
@keyframes rgbBorder{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HEADER */
.header{text-align:center;padding:20px;}
.header h1{animation:rgbText 5s infinite linear;}

/* FOTO */
.creador{text-align:center;margin:20px;}
.creador img{
width:90%;
max-width:400px;
border-radius:15px;
padding:4px;
background:linear-gradient(45deg, red, blue, white, magenta);
background-size:300% 300%;
animation:rgbBorder 4s linear infinite;
}

.creador p{
animation:rgbText 5s infinite linear;
font-weight:bold;
}

/* BUSCADOR */
.search{
padding:12px;
width:90%;
margin:10px auto;
display:block;
border-radius:10px;
border:none;
background:#111;
color:#fff;
}

/* CARDS */
.container{padding:15px;}
.card{
background:#111;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 10px red;
transition:0.3s;
}
.card:hover{
transform:scale(1.02);
box-shadow:0 0 25px red;
}
.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* BOTONES */
.btn{
background:red;
color:#000;
padding:12px;
margin-top:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}
.btn:hover{
background:#ff3333;
box-shadow:0 0 15px red;
}

/* LOGIN */
#loginModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.login-box{
background:#0a0a0a;
padding:25px;
border-radius:20px;
text-align:center;
width:85%;
max-width:320px;
}

/* INPUT RGB */
.input-box{
position:relative;
margin-top:15px;
border-radius:15px;
overflow:hidden;
}

.input-box::before{
content:"";
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:linear-gradient(45deg, red, blue, white, magenta, red);
background-size:400% 400%;
animation:rgbBorder 3s linear infinite;
}

.input-box::after{
content:"";
position:absolute;
top:2px;
left:2px;
right:2px;
bottom:2px;
background:#000;
border-radius:13px;
}

.input-box input{
position:relative;
z-index:2;
width:100%;
padding:14px;
border:none;
background:transparent;
color:#fff;
outline:none;
box-sizing:border-box;
text-align:center;
letter-spacing:2px;
}

/* EFECTO FOCUS */
.input-box input:focus{
box-shadow:0 0 10px red, 0 0 20px blue, 0 0 30px magenta;
}

/* ERROR SHAKE */
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
75%{transform:translateX(-5px);}
100%{transform:translateX(0);}
}

.error{
animation:shake 0.3s;
}

/* PANEL ADMIN */
#adminPanel{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
}

.admin-box{
width:90%;
max-width:400px;
background:#0a0a0a;
padding:20px;
border-radius:20px;
box-shadow:0 0 25px red;
}

/* ALERTA */
.alerta{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#0a0a0a;
padding:15px 25px;
border-radius:15px;
display:none;
box-shadow:0 0 20px red;
border:2px solid transparent;
background-image:linear-gradient(#0a0a0a,#0a0a0a), 
linear-gradient(45deg, red, blue, magenta);
background-origin:border-box;
background-clip:padding-box, border-box;
animation:rgbBorder 3s linear infinite;
z-index:999;
}

.alerta p{
margin:0;
font-weight:bold;
}

/* ANIMACIÓN */
</style>
</head>

<body>

<div class="header">
<h1>ZONA DE DESCARGA DE ALBERT OFICIAL</h1>
</div>

<div class="creador">
<img src="https://i.imgur.com/jJwW8vt.jpeg">
<p>ALBERT OFICIAL CREADOR</p>
</div>

<input class="search" placeholder="Buscar..." onkeyup="buscar(this.value)">

<div class="container" id="lista"></div>

<div class="btn" onclick="abrirLogin()">🔐 ADMIN</div>

<!-- LOGIN -->
<div id="loginModal">
<div class="login-box">
<h3>🔐 Acceso Admin</h3>

<div class="input-box">
<input type="password" id="clave" placeholder="Ingresa clave">
</div>

<div class="btn" onclick="verificar()">ENTRAR</div>
<div class="btn" onclick="cerrarLogin()">CANCELAR</div>
</div>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel">
<div class="admin-box">

<h2>ALBERT OFICIAL</h2>

<div class="input-box">
<input id="nombre" placeholder="Nombre del archivo">
</div>

<div class="input-box">
<input id="link" placeholder="Link de descarga">
</div>

<div class="input-box">
<input id="imagen" placeholder="URL de la imagen">
</div>

<div class="btn" onclick="agregar()">AGREGAR</div>
<div class="btn" onclick="cerrar()">CERRAR</div>

<h3>Archivos Subidos</h3>
<div id="adminLista"></div>

</div>
</div>

<!-- ALERTA -->
<div id="alerta" class="alerta">
<p id="alertaTexto"></p>
</div>

<script>
let archivos = JSON.parse(localStorage.getItem("archivos")) || [];

function render(){
let html="";
archivos.forEach((a,i)=>{
html+=`
<div class="card">
<img src="${a.imagen}">
<h2>${a.nombre}</h2>
<div class="btn" onclick="descargar(${i})">DESCARGAR</div>
</div>
`;
});
document.getElementById("lista").innerHTML=html;
}
render();

function descargar(i){
window.location.href = archivos[i].link;
}

function buscar(text){
let filtrados = archivos.filter(a=>a.nombre.toLowerCase().includes(text.toLowerCase()));
let html="";
filtrados.forEach((a)=>{
html+=`
<div class="card">
<img src="${a.imagen}">
<h2>${a.nombre}</h2>
<div class="btn" onclick="window.location.href='${a.link}'">DESCARGAR</div>
</div>
`;
});
document.getElementById("lista").innerHTML=html;
}

/* LOGIN */
function abrirLogin(){
document.getElementById("loginModal").style.display="flex";
}

function cerrarLogin(){
document.getElementById("loginModal").style.display="none";
}

function verificar(){
let pass=document.getElementById("clave");

if(pass.value==="2927"){
cerrarLogin();
document.getElementById("adminPanel").style.display="flex";
adminRender();
}else{
mostrarAlerta("❌ Clave incorrecta");

// EFECTO SHAKE
pass.classList.add("error");
setTimeout(()=>{pass.classList.remove("error");},300);
}
}

/* ALERTA */
function mostrarAlerta(texto){
let alerta=document.getElementById("alerta");
let textoBox=document.getElementById("alertaTexto");

textoBox.innerText=texto;
alerta.style.display="block";

setTimeout(()=>{
alerta.style.display="none";
},3000);
}

/* ADMIN */
function agregar(){
let n=nombre.value;
let l=link.value;
let img=imagen.value;

archivos.push({nombre:n,link:l,imagen:img});
localStorage.setItem("archivos",JSON.stringify(archivos));
render();
adminRender();
}

function eliminar(index){
if(confirm("¿Eliminar este archivo?")){
archivos.splice(index,1);
localStorage.setItem("archivos",JSON.stringify(archivos));
render();
adminRender();
}
}

function adminRender(){
let html="";
archivos.forEach((a,i)=>{
html+=`
<div class="card">
<h3>${a.nombre}</h3>
<div class="btn" onclick="eliminar(${i})">🗑️ ELIMINAR</div>
</div>
`;
});
document.getElementById("adminLista").innerHTML=html;
}

function cerrar(){
document.getElementById("adminPanel").style.display="none";
}
</script>

</body>
</html>
