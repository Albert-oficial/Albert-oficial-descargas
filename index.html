<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALBERT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:#fff;
font-family:Arial;
}

/* ESCALA GLOBAL (CLAVE 🔥) */
.app{
transform:scale(0.65);
transform-origin:top center;
}

/* RGB MUY SUAVE */
@keyframes rgb{
0%{color:#00ffcc;}
50%{color:#00aaff;}
100%{color:#00ffcc;}
}

/* CONTENEDOR */
.container{
max-width:260px;
margin:auto;
padding:4px;
}

/* HEADER */
.header{
text-align:center;
font-size:10px;
padding:4px;
animation:rgb 8s linear infinite;
}

/* IMAGEN */
.creador img{
width:60%;
max-width:120px;
display:block;
margin:4px auto;
border-radius:6px;
}

/* CARD */
.card{
background:#111;
padding:5px;
border-radius:6px;
margin-bottom:5px;
}

/* IMG */
.card img{
width:100%;
border-radius:4px;
}

/* TEXTO */
.nombre{
font-size:8px;
text-align:center;
margin:2px 0;
}

.fecha{
font-size:7px;
text-align:center;
opacity:0.6;
}

/* BOTON */
.btn{
margin-top:3px;
padding:4px;
text-align:center;
font-size:8px;
background:#00ffaa;
color:#000;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="header">ALBERT DESCARGAS</div>

<div class="creador">
<img src="https://i.imgur.com/kKZMQZU.png">
</div>

<div class="container" id="lista"></div>

</div>

<script>

const archivos=[
{
nombre:"HOLOGRAMA + TELEPOR",
link:"https://www.mediafire.com/",
imagen:"https://i.imgur.com/fxe6U0p.png",
fecha:"03/04"
},
{
nombre:"AIMBOT + HOLOGRAMA",
link:"https://www.mediafire.com/",
imagen:"https://i.imgur.com/WYEUKbK.png",
fecha:"04/04"
},
{
nombre:"HOLOGRAMA AZUL",
link:"https://www.mediafire.com/",
imagen:"https://i.imgur.com/cSPurlN.png",
fecha:"05/04"
}
];

function render(){
let html="";
for(let i=0;i<archivos.length;i++){
html+=
'<div class="card">'+
'<img src="'+archivos[i].imagen+'">'+
'<div class="nombre">'+archivos[i].nombre+'</div>'+
'<div class="fecha">'+archivos[i].fecha+'</div>'+
'<div class="btn" onclick="window.open(\''+archivos[i].link+'\')">DESC</div>'+
'</div>';
}
document.getElementById("lista").innerHTML=html;
}

render();

</script>

</body>
</html>
