<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALBERT DESCARGAS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:#fff;
font-family:Arial;
}

/* RGB SUAVE */
@keyframes rgbText{
0%{color:#00ffcc;}
50%{color:#00aaff;}
100%{color:#00ffcc;}
}

@keyframes rgbBorder{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HEADER */
.header{
text-align:center;
padding:6px;
font-size:12px;
font-weight:bold;
animation:rgbText 6s linear infinite;
}

/* IMAGEN */
.creador{
text-align:center;
margin:6px;
}

.creador img{
width:65%;
max-width:180px;
border-radius:8px;
padding:2px;
background:linear-gradient(45deg,#00ffcc,#00aaff,#00ffcc);
background-size:300% 300%;
animation:rgbBorder 10s linear infinite;
}

/* CONTENEDOR */
.container{
max-width:320px;
margin:auto;
padding:6px;
}

/* CARD */
.card{
background:#111;
padding:6px;
border-radius:8px;
margin-bottom:6px;
box-shadow:0 0 4px rgba(0,255,200,0.3);
}

/* IMAGEN CARD */
.img{
padding:2px;
border-radius:6px;
background:linear-gradient(45deg,#00ffcc,#00aaff,#00ffcc);
background-size:300% 300%;
animation:rgbBorder 10s linear infinite;
}

.img img{
width:100%;
border-radius:5px;
}

/* TEXTO */
.nombre{
font-size:10px;
text-align:center;
margin:3px 0;
animation:rgbText 6s linear infinite;
}

.fecha{
font-size:8px;
text-align:center;
opacity:0.7;
}

/* BOTON */
.btn{
margin-top:4px;
padding:5px;
text-align:center;
border-radius:6px;
font-size:9px;
font-weight:bold;
background:linear-gradient(45deg,#00ffcc,#00aaff,#00ffcc);
background-size:300% 300%;
animation:rgbBorder 10s linear infinite;
color:#000;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
ALBERT DESCARGAS
</div>

<div class="creador">
<img src="https://i.imgur.com/kKZMQZU.png">
</div>

<div class="container" id="lista"></div>

<script>

const archivos = [
{
nombre:"HOLOGRAMA PERSONAJES + TELEPOR",
link:"https://www.mediafire.com/file/rsczfussmk8hm1s/HOLOGRAMA_PERSONAJE_%252B_TELEPOR_INFINITO_%25F0%259F%2591%258C%25F0%259F%25A5%25B5.7z/file",
imagen:"https://i.imgur.com/fxe6U0p.png",
fecha:"03/04/2026"
},
{
nombre:"HOLOGRAMA + AIMBOT",
link:"https://www.mediafire.com/file/63662esowdkfr5e/AIMBOT_80%2525_CABEZA_%252B_HOLOGRAMA_PERSONAJES_90%2525_FF_NORMAL_By_ALBERT_OFICIAL.7z/file",
imagen:"https://i.imgur.com/WYEUKbK.png",
fecha:"04/04/2026"
},
{
nombre:"HOLOGRAMA AZUL",
link:"https://www.mediafire.com/file/j28cfvj29h1yd4o/HOLOGRAMA_AZUL_AURORA_FF_MAX_By_ALBERT_OFICIAL_CREADOR.7z/file",
imagen:"https://i.imgur.com/cSPurlN.png",
fecha:"05/04/2026"
}
];

function render(){
let html="";
for(let i=0;i<archivos.length;i++){
html+=
'<div class="card">'+
'<div class="img"><img src="'+archivos[i].imagen+'"></div>'+
'<div class="nombre">'+archivos[i].nombre+'</div>'+
'<div class="fecha">'+archivos[i].fecha+'</div>'+
'<div class="btn" onclick="window.open(\''+archivos[i].link+'\')">DESCARGAR</div>'+
'</div>';
}
document.getElementById("lista").innerHTML = html;
}

render();

</script>

</body>
</html>
