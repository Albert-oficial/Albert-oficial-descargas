<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALBERT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:#fff;
font-family:Arial;
overflow-x:hidden;
}

/* ESCALA (NO TOCAR) */
.app{
transform:scale(1.1);
transform-origin:top center;
}

/* RGB TEXTO */
@keyframes rgbText{
0%{color:#ff0000;}
25%{color:#ff00ff;}
50%{color:#00ffff;}
75%{color:#00ff00;}
100%{color:#ff0000;}
}

/* RGB BORDE */
@keyframes rgbBorder{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* METEORITOS (LIGERO) */
.meteor{
position:fixed;
top:-50px;
width:2px;
height:80px;
background:linear-gradient(#fff,transparent);
opacity:0.6;
transform:rotate(45deg);
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translate(0,0) rotate(45deg);opacity:0;}
10%{opacity:1;}
100%{transform:translate(200px,100vh) rotate(45deg);opacity:0;}
}

/* CONTENEDOR */
.container{
max-width:280px;
margin:auto;
padding:5px;
}

/* HEADER */
.header{
text-align:center;
font-size:11px;
padding:5px;
animation:rgbText 8s linear infinite;
}

/* IMAGEN */
.creador img{
width:65%;
max-width:140px;
display:block;
margin:5px auto;
border-radius:7px;
padding:2px;
background:linear-gradient(45deg,red,magenta,cyan,lime,yellow);
background-size:300% 300%;
animation:rgbBorder 10s linear infinite;
}

/* CARD */
.card{
background:#111;
padding:6px;
border-radius:7px;
margin-bottom:6px;
}

/* IMG */
.img-box{
padding:2px;
border-radius:6px;
background:linear-gradient(45deg,red,magenta,cyan,lime,yellow);
background-size:300% 300%;
animation:rgbBorder 10s linear infinite;
}

.img-box img{
width:100%;
border-radius:5px;
}

/* TEXTO */
.nombre{
font-size:9px;
text-align:center;
margin:3px 0;
animation:rgbText 10s linear infinite;
}

.fecha{
font-size:8px;
text-align:center;
opacity:0.6;
}

/* BOTON */
.btn{
margin-top:4px;
padding:5px;
text-align:center;
font-size:9px;
border-radius:6px;
cursor:pointer;
background:linear-gradient(45deg,red,magenta,cyan,lime,yellow);
background-size:300% 300%;
animation:rgbBorder 10s linear infinite;
color:#000;
}
</style>
</head>

<body>

<!-- METEORITOS -->
<script>
for(let i=0;i<4;i++){
let m=document.createElement("div");
m.className="meteor";
m.style.left=Math.random()*100+"%";
m.style.animationDuration=(4+Math.random()*4)+"s";
m.style.animationDelay=(Math.random()*5)+"s";
document.body.appendChild(m);
}
</script>

<div class="app">

<div class="header">ALBERT DESCARGAS</div>

<div class="creador">
<img src="https://i.imgur.com/kKZMQZU.png">
</div>

<div class="container" id="lista"></div>

</div>

<script>

const archivos=[
{
nombre:"HOLOGRAMA + TELEPOR",
link:"https://www.mediafire.com/",
imagen:"https://i.imgur.com/fxe6U0p.png",
fecha:"03/04"
},
{
nombre:"AIMBOT + HOLOGRAMA",
link:"https://www.mediafire.com/",
imagen:"https://i.imgur.com/WYEUKbK.png",
fecha:"04/04"
},
{
nombre:"HOLOGRAMA AZUL",
link:"https://www.mediafire.com/",
imagen:"https://i.imgur.com/cSPurlN.png",
fecha:"05/04"
}
];

function render(){
let html="";
for(let i=0;i<archivos.length;i++){
html+=
'<div class="card">'+
'<div class="img-box"><img src="'+archivos[i].imagen+'"></div>'+
'<div class="nombre">'+archivos[i].nombre+'</div>'+
'<div class="fecha">'+archivos[i].fecha+'</div>'+
'<div class="btn" onclick="window.open(\''+archivos[i].link+'\')">Descargar</div>'+
'</div>';
}
document.getElementById("lista").innerHTML=html;
}

render();

</script>

</body>
</html>
