<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALBERT</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#000;
color:#fff;
font-family:Arial;
}

/* ESCALA AJUSTADA (ANTES 0.65) */
.app{
transform:scale(1.1);
transform-origin:top center;
}

/* RGB SUAVE */
@keyframes rgb{
0%{color:#00ffcc;}
50%{color:#00aaff;}
100%{color:#00ffcc;}
}

/* CONTENEDOR */
.container{
max-width:280px;
margin:auto;
padding:5px;
}

/* HEADER */
.header{
text-align:center;
font-size:11px;
padding:5px;
animation:rgb 8s linear infinite;
}

/* IMAGEN */
.creador img{
width:65%;
max-width:140px;
display:block;
margin:5px auto;
border-radius:7px;
}

/* CARD */
.card{
background:#111;
padding:6px;
border-radius:7px;
margin-bottom:6px;
}

/* IMG */
.card img{
width:100%;
border-radius:5px;
}

/* TEXTO */
.nombre{
font-size:9px;
text-align:center;
margin:3px 0;
}

.fecha{
font-size:8px;
text-align:center;
opacity:0.6;
}

/* BOTON */
.btn{
margin-top:4px;
padding:5px;
text-align:center;
font-size:9px;
background:#00ffaa;
color:#000;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="header">ALBERT DESCARGAS</div>

<div class="creador">
<img src="https://i.imgur.com/kKZMQZU.png">
</div>

<div class="container" id="lista"></div>

</div>

<script>

const archivos=[
{
nombre:"HOLOGRAMA + TELEPOR",
link:"https://www.mediafire.com/",
imagen:"https://i.imgur.com/fxe6U0p.png",
fecha:"03/04"
},
{
nombre:"AIMBOT + HOLOGRAMA",
link:"https://www.mediafire.com/",
imagen:"https://i.imgur.com/WYEUKbK.png",
fecha:"04/04"
},
{
nombre:"HOLOGRAMA AZUL",
link:"https://www.mediafire.com/",
imagen:"https://i.imgur.com/cSPurlN.png",
fecha:"05/04"
}
];

function render(){
let html="";
for(let i=0;i<archivos.length;i++){
html+=
'<div class="card">'+
'<img src="'+archivos[i].imagen+'">'+
'<div class="nombre">'+archivos[i].nombre+'</div>'+
'<div class="fecha">'+archivos[i].fecha+'</div>'+
'<div class="btn" onclick="window.open(\''+archivos[i].link+'\')">Descargar</div>'+
'</div>';
}
document.getElementById("lista").innerHTML=html;
}

render();

</script>

</body>
</html>
