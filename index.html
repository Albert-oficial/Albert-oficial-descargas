<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZONA DE DESCARGA DE ALBERT OFICIAL</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:Arial;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* ANIMACIONES RGB SUAVES */
@keyframes rgbText{
0%{color:#ff0000;}
20%{color:#ff00ff;}
40%{color:#00ffff;}
60%{color:#00ff00;}
80%{color:#ffff00;}
100%{color:#ff0000;}
}

@keyframes rgbBorder{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* METEORITOS */
.meteor{
position:fixed;
top:-100px;
width:2px;
height:120px;
background:linear-gradient(white, rgba(255,255,255,0));
opacity:0.9;
filter:blur(1px);
transform:rotate(45deg);
animation:meteorFall linear infinite;
}

.meteor::before{
content:"";
position:absolute;
top:0;
left:-2px;
width:6px;
height:6px;
background:white;
border-radius:50%;
box-shadow:0 0 10px white, 0 0 20px white;
}

@keyframes meteorFall{
0%{transform:translate(0,0) rotate(45deg);opacity:0;}
10%{opacity:1;}
100%{transform:translate(300px,120vh) rotate(45deg);opacity:0;}
}

.header{text-align:center;padding:20px;}
.header h1{
animation:rgbText 8s infinite linear;
}

.creador{text-align:center;margin:20px;}
.creador img{
width:90%;
max-width:400px;
border-radius:15px;
padding:4px;
background:linear-gradient(45deg, red, magenta, cyan, lime, yellow);
background-size:400% 400%;
animation:rgbBorder 6s linear infinite;
}

.creador p{
animation:rgbText 8s infinite linear;
font-weight:bold;
}

.search{
padding:12px;
width:90%;
margin:10px auto;
display:block;
border-radius:10px;
border:none;
background:#111;
color:#fff;
font-size:16px;
}

.container{padding:15px;}

.card{
background:#111;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 15px #ff00ff;
transition:0.3s;
}
.card:hover{
transform:scale(1.03);
box-shadow:0 0 35px #00ffff;
}

.img-rgb{
padding:4px;
border-radius:10px;
background:linear-gradient(45deg, red, magenta, cyan, lime, yellow);
background-size:400% 400%;
animation:rgbBorder 6s linear infinite;
margin-bottom:10px;
}
.img-rgb img{
width:100%;
border-radius:8px;
}

.nombre-rgb{
animation:rgbText 8s infinite linear;
text-align:center;
}

.fecha{
text-align:center;
font-size:14px;
animation:rgbText 10s infinite linear;
}

.btn{
padding:12px;
margin-top:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(45deg, red, magenta, cyan, lime, yellow);
background-size:400% 400%;
animation:rgbBorder 6s linear infinite;
color:#000;
}
</style>
</head>

<body>

<div class="header">
<h1>ZONA DE DESCARGA DE ALBERT OFICIAL</h1>
</div>

<div class="creador">
<img src="https://i.imgur.com/jJwW8vt.jpeg">
<p>ALBERT OFICIAL CREADOR</p>
</div>

<input class="search" placeholder="Buscar..." oninput="buscar(this.value)">
<div class="container" id="lista"></div>

<script>

/* METEORITOS DINÁMICOS */
function crearMeteoros(){
for(let i=0;i<8;i++){
const m = document.createElement("div");
m.className = "meteor";
m.style.left = Math.random()*100 + "%";
m.style.animationDuration = (3 + Math.random()*4) + "s";
m.style.animationDelay = (Math.random()*5) + "s";
document.body.appendChild(m);
}
}
crearMeteoros();

/* ARCHIVOS (SIN LOCALSTORAGE, SIN BUG) */
const archivos = [
{
id:"file1",
nombre:"HOLOGRAMA PERSONAJES + TELEPOR INFINITO",
link:"https://www.mediafire.com/file/rsczfussmk8hm1s/HOLOGRAMA_PERSONAJE_%252B_TELEPOR_INFINITO_%25F0%259F%2591%258C%25F0%259F%25A5%25B5.7z/file",
imagen:"https://i.imgur.com/fxe6U0p.png",
fecha:"03/04/2026"
},
{
id:"file2",
nombre:"HOLOGRAMA 90% PERSO + AIMBOT 80% CABEZ",
link:"https://www.mediafire.com/file/63662esowdkfr5e/AIMBOT_80%2525_CABEZA_%252B_HOLOGRAMA_PERSONAJES_90%2525_FF_NORMAL_By_ALBERT_OFICIAL.7z/file",
imagen:"https://i.imgur.com/WYEUKbK.png",
fecha:"04/04/2026"
},
{
id:"file3",
nombre:"HOLOGRAMA AURORA AZUL",
link:"https://www.mediafire.com/file/j28cfvj29h1yd4o/HOLOGRAMA_AZUL_AURORA_FF_MAX_By_ALBERT_OFICIAL_CREADOR.7z/file",
imagen:"https://i.imgur.com/cSPurlN.png",
fecha:"05/04/2026"
}
];

/* RENDER */
function render(lista = archivos){
const contenedor = document.getElementById("lista");
let html="";

lista.forEach((a)=>{
html+=`
<div class="card">
<div class="img-rgb"><img src="${a.imagen}" loading="lazy"></div>
<h2 class="nombre-rgb">${a.nombre}</h2>
<div class="fecha">📅 ${a.fecha}</div>
<div class="btn" onclick="descargar('${a.link}')">DESCARGAR</div>
</div>`;
});

contenedor.innerHTML = html;
}
render();

/* DESCARGAR */
function descargar(link){
setTimeout(()=>{
window.open(link, "_blank");
},200);
}

/* BUSCAR */
function buscar(text){
const filtrados = archivos.filter(a =>
a.nombre.toLowerCase().includes(text.toLowerCase())
);
render(filtrados);
}

</script>

</body>
</html>
